services:
  web:
    build:
      context: https://github.com/laurent7850/reconciliation-caisse.git#main
    image: reconciliation-caisse:latest
    container_name: reconciliation-caisse
    restart: unless-stopped
    networks:
      - default
      - root_default
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=root_default"
      - "traefik.http.routers.reconciliation.rule=Host(`caisses.distr-action.com`)"
      - "traefik.http.routers.reconciliation.entrypoints=websecure"
      - "traefik.http.routers.reconciliation.tls=true"
      - "traefik.http.routers.reconciliation.tls.certresolver=letsencrypt"
      - "traefik.http.routers.reconciliation.middlewares=reconciliation-auth"
      - "traefik.http.services.reconciliation.loadbalancer.server.port=80"
      - "traefik.http.middlewares.reconciliation-auth.basicauth.users=admin:$$2y$$05$$c7dwU3tceosREMdM5.nlnutFOqp8NqDCqR5WPqIpjp82CkTXIkppO"
      - "traefik.http.routers.reconciliation-http.rule=Host(`caisses.distr-action.com`)"
      - "traefik.http.routers.reconciliation-http.entrypoints=web"
      - "traefik.http.routers.reconciliation-http.middlewares=reconciliation-redirect"
      - "traefik.http.middlewares.reconciliation-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.reconciliation-redirect.redirectscheme.permanent=true"

networks:
  root_default:
    external: true
